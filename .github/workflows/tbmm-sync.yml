name: TBMM Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * *"
    - cron: "50 20 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Firebase service account dosyasını oluştur
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > serviceAccount.json

      - name: TBMM senkronunu çalıştır
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: serviceAccount.json
        run: |
          python scraper/fetch_offers.py
